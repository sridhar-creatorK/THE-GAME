<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spaceflight-Style Rocket Simulator</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <h1>Spaceflight-Style Rocket Simulator</h1>

    <p class="help">
      <kbd>↑</kbd>/<kbd>Space</kbd> Thrust,
      <kbd>←</kbd> Rotate Left,
      <kbd>→</kbd> Rotate Right,
      <kbd>R</kbd> Reset
    </p>

    <section class="hud">
      <div>Altitude: <span id="altitude">0</span> m</div>
      <div>Fuel: <span id="fuel">100</span>%</div>
      <div>Vertical Speed: <span id="vSpeed">0</span> m/s</div>
      <div>Horizontal Speed: <span id="hSpeed">0</span> m/s</div>
      <div>Angle: <span id="angle">0</span>°</div>
      <div>Status: <span id="status">Ready</span></div>
    </section>

    <canvas id="gameCanvas" width="420" height="700"></canvas>
  </main>

  <script src="script.js"></script>
</body>
</html>
