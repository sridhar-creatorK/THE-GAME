<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2D Rocket Simulation</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <h1>2D Rocket Simulation</h1>
    <p class="help">Hold <kbd>Space</kbd> to thrust. Press <kbd>R</kbd> to reset.</p>

    <section class="hud" aria-live="polite">
      <div>Altitude: <span id="altitude">0</span> px</div>
      <div>Velocity: <span id="velocity">0</span> px/s</div>
      <div>Fuel: <span id="fuel">100</span>%</div>
      <div>Status: <span id="status">Flying</span></div>
    </section>

    <canvas id="gameCanvas" width="420" height="640" aria-label="Rocket simulation area"></canvas>
  </main>

  <script src="script.js"></script>
</body>
</html>
