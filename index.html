<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spaceflight Simulator Style</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <h1>Spaceflight Simulator Style Lander</h1>
    <p class="help"><kbd>W</kbd> Throttle+ · <kbd>S</kbd> Throttle- · <kbd>A</kbd><kbd>D</kbd> Rotate · <kbd>R</kbd> Reset · <kbd>B</kbd> Build · <kbd>C</kbd> Continue</p>

    <div class="game-wrap">
      <section class="hud" aria-live="polite">
        <div><span>Altitude</span><strong id="altitude">0 m</strong></div>
        <div><span>Velocity</span><strong id="velocity">0 m/s</strong></div>
        <div><span>Angle</span><strong id="angle">0°</strong></div>
        <div><span>Status</span><strong id="status">Flying</strong></div>
        <div><span>Throttle</span><strong id="throttle">0%</strong></div>
        <div class="fuel-row"><span>Fuel</span><strong id="fuel">100%</strong></div>
        <div class="fuel-wrap"><div id="fuelBar"></div></div>
        <div class="sensitivity">
          <label for="rotationSensitivity">Rotation Sensitivity</label>
          <input id="rotationSensitivity" type="range" min="0.5" max="1.5" step="0.05" value="1" />
        </div>
      </section>

      <canvas id="gameCanvas" width="420" height="700" aria-label="Spaceflight lander game"></canvas>

      <div id="menuScene" class="scene-panel">
        <h2>SPACEFLIGHT LANDER</h2>
        <button id="startBuildBtn">Click to Build</button>
      </div>

      <div id="buildScene" class="scene-panel hidden">
        <h2>Build Rocket</h2>
        <p>Select a part, then click in build area to place (snaps vertically).</p>
        <div class="build-actions">
          <button id="selectEngineBtn">Engine</button>
          <button id="selectTankBtn">Tank</button>
          <button id="selectSolarBtn">Solar</button>
          <button id="launchBtn">Launch</button>
        </div>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
