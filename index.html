<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spaceflight Builder</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <button id="menuBtn">Menu</button>
      <button id="clearBtn">Clear Build</button>
      <button id="launchBtn">Launch</button>
      <div id="modeLabel">BUILD MODE</div>
    </header>

    <div class="workspace">
      <aside class="parts-panel" id="partsPanel">
        <button class="part-btn active" data-part="engine">Engine</button>
        <button class="part-btn" data-part="tank">Fuel Tank</button>
        <button class="part-btn" data-part="capsule">Capsule</button>
        <button class="part-btn" data-part="legs">Landing Legs</button>
        <button class="part-btn" data-part="solar">Solar Panel</button>
      </aside>

      <section class="build-area">
        <canvas id="gameCanvas" aria-label="Build and flight canvas"></canvas>
      </section>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
